<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reserva tu cita · ODIOSA Studio</title>
<style>
  :root{
    --rosa-fuerte:#e8a0b4;
    --rosa-suave:#fbe9ee;
    --rosa-medio:#f3cdda;
    --blanco:#ffffff;
    --texto:#4a3640;
    --texto-suave:#9c7c89;
    --dorado:#d9b48f;
    --radius:18px;
    --sombra: 0 10px 30px rgba(232,160,180,0.18);
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    background: linear-gradient(180deg, var(--rosa-suave) 0%, var(--blanco) 60%);
    color:var(--texto);
    min-height:100vh;
  }
  .wrap{
    max-width:560px;
    margin:0 auto;
    padding:28px 20px 80px;
  }
  header{
    text-align:center;
    margin-bottom:22px;
  }
  .logo{
    font-family: Georgia, 'Times New Roman', serif;
    font-size:30px;
    letter-spacing:1px;
    color:var(--rosa-fuerte);
    margin:0;
  }
  .logo span{ color:var(--dorado); font-style:italic; }
  .sub{
    color:var(--texto-suave);
    font-size:13px;
    margin-top:4px;
    letter-spacing:.5px;
    text-transform:uppercase;
  }
  .stepper{
    display:flex;
    justify-content:center;
    gap:6px;
    margin:18px 0 26px;
  }
  .dot{
    width:8px;height:8px;border-radius:50%;
    background:var(--rosa-medio);
    transition:.3s;
  }
  .dot.active{ background:var(--rosa-fuerte); width:22px; border-radius:6px;}
  .card{
    background:var(--blanco);
    border-radius:var(--radius);
    box-shadow:var(--sombra);
    padding:24px;
    animation:fade .35s ease;
  }
  @keyframes fade{ from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);} }
  h2{
    font-family:Georgia, serif;
    font-size:21px;
    margin:0 0 4px;
    color:var(--texto);
  }
  .hint{ color:var(--texto-suave); font-size:13.5px; margin:0 0 18px; }
  .options{ display:flex; flex-direction:column; gap:10px; }
  .opt{
    border:1.5px solid var(--rosa-medio);
    border-radius:14px;
    padding:14px 16px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:var(--blanco);
    transition:.2s;
    font-size:15px;
  }
  .opt:hover{ border-color:var(--rosa-fuerte); background:var(--rosa-suave); }
  .opt.selected{ border-color:var(--rosa-fuerte); background:var(--rosa-suave); font-weight:600; }
  .opt .check{
    width:18px;height:18px;border-radius:50%;
    border:1.5px solid var(--rosa-medio);
    flex-shrink:0;
  }
  .opt.selected .check{ background:var(--rosa-fuerte); border-color:var(--rosa-fuerte); }
  .big-opt{
    display:flex; flex-direction:column; align-items:center;
    text-align:center; gap:8px; padding:22px 16px;
  }
  .big-opt .emoji{ font-size:28px; }
  .row2{ display:flex; gap:12px; }
  .row2 .opt{ flex:1; }
  .upload-box{
    border:1.5px dashed var(--rosa-medio);
    border-radius:14px;
    padding:26px 16px;
    text-align:center;
    cursor:pointer;
    color:var(--texto-suave);
    font-size:14px;
    background:var(--rosa-suave);
  }
  .upload-box img{ max-width:100%; border-radius:10px; margin-top:10px; }
  input[type=file]{ display:none; }
  .deposit-box{
    background:var(--rosa-suave);
    border-radius:14px;
    padding:18px;
    text-align:center;
    margin-bottom:6px;
  }
  .deposit-amount{
    font-family:Georgia,serif;
    font-size:34px;
    color:var(--rosa-fuerte);
    margin:4px 0;
  }
  .note{
    font-size:12.5px;
    color:var(--texto-suave);
    line-height:1.5;
  }
  .cal-grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px;
    margin-bottom:18px;
  }
  .cal-day{
    border:1.5px solid var(--rosa-medio);
    border-radius:10px;
    padding:8px 4px;
    text-align:center;
    font-size:12.5px;
    cursor:pointer;
  }
  .cal-day.disabled{ opacity:.35; cursor:not-allowed; }
  .cal-day.selected{ background:var(--rosa-fuerte); color:#fff; border-color:var(--rosa-fuerte); }
  .times{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
  .time-slot{
    border:1.5px solid var(--rosa-medio);
    border-radius:10px;
    padding:9px 4px;
    text-align:center;
    font-size:13px;
    cursor:pointer;
  }
  .time-slot.selected{ background:var(--rosa-fuerte); color:#fff; border-color:var(--rosa-fuerte); }
  .time-slot.taken{ opacity:.3; cursor:not-allowed; text-decoration:line-through; }
  label.field{ display:block; font-size:13px; color:var(--texto-suave); margin:14px 0 5px; }
  input[type=text], input[type=tel]{
    width:100%;
    padding:11px 14px;
    border-radius:10px;
    border:1.5px solid var(--rosa-medio);
    font-size:14.5px;
    color:var(--texto);
    background:var(--rosa-suave);
  }
  input:focus{ outline:2px solid var(--rosa-fuerte); }
  .btns{ display:flex; gap:10px; margin-top:22px; }
  button{
    border:none;
    border-radius:30px;
    padding:13px 20px;
    font-size:14.5px;
    cursor:pointer;
    flex:1;
    font-weight:600;
  }
  .btn-primary{ background:var(--rosa-fuerte); color:#fff; }
  .btn-primary:disabled{ background:#f1d4dc; color:#fff; cursor:not-allowed; }
  .btn-secondary{ background:var(--blanco); color:var(--texto-suave); border:1.5px solid var(--rosa-medio); flex:0 0 90px; }
  .summary-line{
    display:flex; justify-content:space-between;
    padding:9px 0; border-bottom:1px solid var(--rosa-suave);
    font-size:14px;
  }
  .summary-line b{ font-weight:600; }
  .wa-btn{
    display:flex; align-items:center; justify-content:center; gap:8px;
    background:#3fb24a; color:#fff; border-radius:30px; padding:14px;
    text-decoration:none; font-weight:600; font-size:15px; margin-top:18px;
  }
  .success-icon{ text-align:center; font-size:46px; margin-bottom:6px; }
  footer{
    text-align:center;
    color:var(--texto-suave);
    font-size:11.5px;
    margin-top:24px;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <p class="logo">ODIOSA <span>Studio</span></p>
    <p class="sub">Reserva tu cita en línea</p>
  </header>

  <div class="stepper" id="stepper"></div>

  <div class="card" id="cardArea"></div>

  <footer>Anticipo no reembolsable de $200 MXN · Se descuenta del total del servicio</footer>
</div>

<script>
// ---------- CONFIG (edita aquí los datos del negocio) ----------
const CONFIG = {
  whatsappNumber: "5215549182540", // número de WhatsApp del negocio
  depositAmount: 200,
  paymentMethods: [ // <-- edita con tus datos reales de cobro
    { label: "Transferencia / SPEI", detail: "Banco: BBVA · CLABE: 0123 4567 8901 234567 · A nombre de: Nails Studio" },
    { label: "Tarjeta", detail: "Banco: BBVA · Tarjeta: 4152 XXXX XXXX 1234 · A nombre de: Nails Studio" }
  ],
  days: [], // se generan dinámicamente: próximos 6 días disponibles
  timeSlots: ["10:00 am","11:30 am","1:00 pm","2:30 pm","4:00 pm","5:30 pm"],
  takenSlots: { } // ejemplo: {"2026-06-26":["1:00 pm"]}
};

const SERVICES = {
  unas: {
    label: "💅 Uñas",
    options: [
      "Acrílicas esculturales",
      "Gel semipermanente",
      "Pedicura",
      "Exfoliación",
      "Manicura"
    ],
    photoPrompt: "Sube una foto del diseño que deseas"
  },
  cabello: {
    label: "💇‍♀️ Tratamientos capilares",
    options: [
      "Botox capilar",
      "Queratina brasileña",
      "Keratina lavado inmediato",
      "Keratina colombiana alisado efecto espejo"
    ],
    photoPrompt: "Sube una foto de tu cabello actual"
  }
};

// generate next 6 available days (skip nothing for simplicity, mark Sundays disabled)
function generateDays(){
  const days = [];
  const today = new Date();
  let i = 1;
  while(days.length < 8){
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    const dow = d.getDay();
    days.push({
      date: d,
      label: d.toLocaleDateString('es-MX',{ weekday:'short', day:'numeric' }),
      disabled: dow === 0 // domingo cerrado
    });
    i++;
  }
  return days;
}
CONFIG.days = generateDays();

const state = {
  step: 1,
  category: null,
  service: null,
  services: [],          // array of selected services (supports multiple)
  photo: null,
  day: null,
  time: null,
  name: "",
  phone: "",
  paymentStatus: "pending",
  paymentId: null,
  takenMap: {},
  bookingSaved: false
};

function dateKey(d){
  // YYYY-MM-DD en hora local, para que coincida con lo que guarda el Sheet
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return `${yyyy}-${mm}-${dd}`;
}

async function fetchAvailability(){
  try{
    const resp = await fetch('/api/get-availability');
    const data = await resp.json();
    state.takenMap = data.taken || {};
  } catch(err){
    state.takenMap = {};
  }
}

const TOTAL_STEPS = 7;

function setStep(n){
  state.step = n;
  render();
  window.scrollTo({top:0, behavior:'smooth'});
  if(n === 4){ fetchAvailability().then(render); }
}

function renderStepper(){
  const el = document.getElementById('stepper');
  el.innerHTML = "";
  for(let i=1;i<=TOTAL_STEPS;i++){
    const dot = document.createElement('div');
    dot.className = 'dot' + (i===state.step ? ' active' : '');
    el.appendChild(dot);
  }
}

function fileToBase64(file, cb){
  const reader = new FileReader();
  reader.onload = () => cb(reader.result);
  reader.readAsDataURL(file);
}

function render(){
  renderStepper();
  const card = document.getElementById('cardArea');

  if(state.step === 1){
    card.innerHTML = `
      <h2>¿Qué te gustaría agendar?</h2>
      <p class="hint">Elige el tipo de servicio</p>
      <div class="options">
        ${Object.entries(SERVICES).map(([key,s]) => `
          <div class="opt big-opt" data-key="${key}" onclick="selectCategory('${key}')">
            <div class="emoji">${s.label.split(' ')[0]}</div>
            <div>${s.label.replace(/^\S+\s/,'')}</div>
          </div>
        `).join('')}
      </div>
    `;
  }

  if(state.step === 2){
    const s = SERVICES[state.category];
    const allServices = Object.values(SERVICES).flatMap(sv => sv.options);
    const selectedList = state.services.length > 0 ? state.services : (state.service ? [state.service] : []);

    card.innerHTML = `
      <h2>${s.label}</h2>
      <p class="hint">Selecciona uno o más servicios para tu cita</p>
      ${selectedList.length > 0 ? `
        <div style="background:var(--rosa-suave);border-radius:12px;padding:10px 14px;margin-bottom:12px;font-size:13.5px">
          🛒 <b>Seleccionados:</b> ${selectedList.join(', ')}
        </div>
      ` : ''}
      <div class="options">
        ${s.options.map(opt => {
          const isSelected = selectedList.includes(opt);
          return `
            <div class="opt ${isSelected?'selected':''}" onclick="toggleService('${opt.replace(/'/g,"\\'")}')">
              <span>${opt}</span><span class="check"></span>
            </div>`;
        }).join('')}
      </div>
      <p style="font-size:12.5px;color:var(--texto-suave);text-align:center;margin:10px 0 0">
        ¿Quieres agregar un servicio de otra categoría?
        <a href="#" onclick="addAnotherCategory()" style="color:var(--rosa-fuerte)">Agregar más</a>
      </p>
      <div class="btns">
        <button class="btn-secondary" onclick="setStep(1)">Atrás</button>
        <button class="btn-primary" ${selectedList.length===0?'disabled':''} onclick="confirmServices()">Continuar</button>
      </div>
    `;
  }

  if(state.step === 3){
    const s = SERVICES[state.category];
    card.innerHTML = `
      <h2>Foto de referencia</h2>
      <p class="hint">${s.photoPrompt}</p>
      <label class="upload-box" for="fileInput">
        ${state.photo ? `<img src="${state.photo}">` : '📷 <br>Toca para subir una foto'}
      </label>
      <input type="file" id="fileInput" accept="image/*" onchange="handlePhoto(event)">
      <div class="btns">
        <button class="btn-secondary" onclick="setStep(2)">Atrás</button>
        <button class="btn-primary" ${!state.photo?'disabled':''} onclick="setStep(4)">Continuar</button>
      </div>
    `;
  }

  if(state.step === 4){
    const selectedKey = state.day!==null ? dateKey(CONFIG.days[state.day].date) : null;
    const takenForDay = selectedKey ? (state.takenMap[selectedKey] || []) : [];
    card.innerHTML = `
      <h2>Elige fecha y hora</h2>
      <div class="deposit-box">
        <div style="font-size:13px;color:var(--texto-suave)">Anticipo para reservar</div>
        <div class="deposit-amount">$${CONFIG.depositAmount} MXN</div>
        <div class="note">Se descuenta del total del servicio. No es reembolsable en caso de cancelación.</div>
      </div>
      <label class="field">Fecha</label>
      <div class="cal-grid">
        ${CONFIG.days.map((d,i)=>`
          <div class="cal-day ${d.disabled?'disabled':''} ${state.day===i?'selected':''}"
               onclick="${d.disabled?'':'selectDay('+i+')'}">
            ${d.label}
          </div>`).join('')}
      </div>
      ${state.day!==null ? `
        <label class="field">Horario disponible</label>
        <div class="times">
          ${CONFIG.timeSlots.map(t => {
            const taken = takenForDay.includes(t);
            return `<div class="time-slot ${state.time===t?'selected':''} ${taken?'taken':''}"
                         onclick="${taken?'':"selectTime('"+t+"')"}">${t}</div>`;
          }).join('')}
        </div>
        ${takenForDay.length === CONFIG.timeSlots.length ? `<p class="note" style="text-align:center;margin-top:8px">Este día ya no tiene horarios disponibles, elige otra fecha 🌸</p>` : ''}
      ` : ''}
      <div class="btns">
        <button class="btn-secondary" onclick="setStep(3)">Atrás</button>
        <button class="btn-primary" ${!(state.day!==null && state.time) ? 'disabled':''} onclick="setStep(5)">Continuar</button>
      </div>
    `;
  }

  if(state.step === 5){
    card.innerHTML = `
      <h2>Anticipo para reservar</h2>
      <p class="hint">Tu cita <b>no queda confirmada</b> hasta que el pago sea aprobado. No es reembolsable, pero se descuenta del total del servicio.</p>
      <div class="deposit-box">
        <div style="font-size:13px;color:var(--texto-suave)">Monto a pagar</div>
        <div class="deposit-amount">$${CONFIG.depositAmount} MXN</div>
      </div>
      ${state.paymentStatus === 'checking' ? `
        <p class="note" style="text-align:center">Verificando tu pago…</p>
      ` : state.paymentStatus === 'approved' ? `
        <div class="opt selected" style="cursor:default;justify-content:center;gap:8px">
          ✅ <span>Pago aprobado y horario reservado</span>
        </div>
      ` : state.paymentStatus === 'slot_taken' ? `
        <div class="opt" style="cursor:default;justify-content:center;gap:8px;border-color:#c0577a">
          ⚠️ <span>Tu pago se aprobó, pero alguien más reservó ese horario justo antes que tú</span>
        </div>
        <p class="note" style="text-align:center;margin-top:8px">No te preocupes, tu anticipo queda registrado — contáctanos por WhatsApp para reagendar tu horario.</p>
      ` : `
        <button class="btn-primary" style="width:100%;background:#2faa56" onclick="payWithMercadoPago()">
          Pagar con Mercado Pago
        </button>
        <p class="note" style="text-align:center;margin-top:10px">
          Acepta tarjeta, OXXO y transferencia SPEI. Serás redirigida a la página segura de Mercado Pago.
        </p>
        ${state.paymentStatus === 'rejected' ? `<p class="note" style="text-align:center;color:#c0577a">El pago no fue aprobado. Intenta de nuevo.</p>` : ''}
      `}
      <div class="btns">
        <button class="btn-secondary" onclick="setStep(4)">Atrás</button>
        <button class="btn-primary" id="paymentBtn" ${state.paymentStatus!=='approved'?'disabled':''} onclick="setStep(6)">Continuar</button>
      </div>
    `;
  }

  if(state.step === 6){
    card.innerHTML = `
      <h2>Tus datos</h2>
      <p class="hint">Para confirmar tu cita</p>
      <label class="field">Nombre completo</label>
      <input type="text" id="nameInput" value="${state.name}" placeholder="Ej. Ana López" oninput="state.name=this.value; toggleStep6Btn()">
      <label class="field">Teléfono / WhatsApp</label>
      <input type="tel" id="phoneInput" value="${state.phone}" placeholder="Ej. 55 1234 5678" oninput="state.phone=this.value; toggleStep6Btn()">
      <div class="btns">
        <button class="btn-secondary" onclick="setStep(5)">Atrás</button>
        <button class="btn-primary" id="step6btn" ${!(state.name&&state.phone)?'disabled':''} onclick="setStep(7)">Continuar</button>
      </div>
    `;
  }

  if(state.step === 7){
    const dayObj = CONFIG.days[state.day];
    const fecha = dayObj.date.toLocaleDateString('es-MX',{weekday:'long', day:'numeric', month:'long'});
    const siteUrl = window.location.origin;
    const mensaje = `🌸✨ ¡Hola! Acabo de reservar mi cita en ODIOSA Studio 💅🩷

🗓️ Fecha: ${fecha}
🕐 Hora: ${state.time}
💆‍♀️ Servicio: ${state.service}
👤 Nombre: ${state.name}
📱 Tel: ${state.phone}

💸 Anticipo pagado: $${CONFIG.depositAmount} MXN ✅

¿Necesito cambiar mi cita? Puedo hacerlo aquí con mínimo 24h de anticipación:
🔗 ${siteUrl}/reschedule.html?id=${state.paymentId}

¡Nos vemos pronto! 🌷✨`;
    const waLink = `https://wa.me/${CONFIG.whatsappNumber}?text=${encodeURIComponent(mensaje)}`;

    card.innerHTML = `
      <div class="success-icon">🌸</div>
      <h2 style="text-align:center">¡Casi listo!</h2>
      <p class="hint" style="text-align:center">Revisa el resumen y confirma por WhatsApp</p>
      <div class="summary-line"><span>Servicio</span><b>${state.service}</b></div>
      <div class="summary-line"><span>Fecha</span><b>${fecha}</b></div>
      <div class="summary-line"><span>Hora</span><b>${state.time}</b></div>
      <div class="summary-line"><span>Nombre</span><b>${state.name}</b></div>
      <div class="summary-line"><span>Teléfono</span><b>${state.phone}</b></div>
      <div class="summary-line"><span>Anticipo</span><b>$${CONFIG.depositAmount} MXN ✓ pagado</b></div>
      <a class="wa-btn" href="${waLink}" target="_blank">
        ✆ Confirmar por WhatsApp
      </a>
      <p class="note" style="text-align:center;margin-top:12px">
        Adjunta también tu comprobante de pago y la foto de referencia en el chat de WhatsApp para finalizar.
      </p>
      <div class="btns">
        <button class="btn-secondary" onclick="setStep(6)">Atrás</button>
        <button class="btn-secondary" style="flex:1" onclick="restart()">Empezar de nuevo</button>
      </div>
    `;
  }
}

function selectCategory(key){
  state.category = key;
  if(state.services.length === 0) state.services = [];
  setStep(2);
}

function toggleService(opt){
  const idx = state.services.indexOf(opt);
  if(idx === -1){
    state.services.push(opt);
  } else {
    state.services.splice(idx, 1);
  }
  state.service = state.services[0] || null;
  render();
}

function addAnotherCategory(){
  // Switch to the other category and keep selections
  const otherKey = state.category === 'unas' ? 'cabello' : 'unas';
  state.category = otherKey;
  render();
}

function confirmServices(){
  state.service = state.services.join(', ');
  setStep(3);
}
function handlePhoto(e){
  const file = e.target.files[0];
  if(file){ fileToBase64(file, (b64)=>{ state.photo = b64; render(); }); }
}
function selectDay(i){ state.day = i; state.time = null; render(); }
function selectTime(t){ state.time = t; render(); }

async function payWithMercadoPago(){
  // Guardamos el progreso porque vamos a salir del sitio para pagar.
  // OJO: excluimos "photo" porque es una imagen en base64 y puede ser
  // demasiado grande para localStorage (causa QuotaExceededError).
  const { photo, ...stateWithoutPhoto } = state;
  try{
    localStorage.setItem('booking_state', JSON.stringify(stateWithoutPhoto));
  } catch(err){
    console.error('No se pudo guardar el progreso localmente:', err);
    // Continuamos igual: no es crítico para completar el pago.
  }

  const btn = document.querySelector('#cardArea button.btn-primary');
  if(btn){ btn.disabled = true; btn.textContent = 'Generando pago…'; }

  try{
    const resp = await fetch('/api/create-preference', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ service: state.service, name: state.name, phone: state.phone })
    });
    const data = await resp.json();
    if(data.init_point){
      window.location.href = data.init_point; // redirige a Mercado Pago
    } else {
      alert('No se pudo iniciar el pago. Intenta de nuevo.');
    }
  } catch(err){
    alert('Error de conexión. Intenta de nuevo.');
  }
}

async function checkPaymentFromUrl(){
  const params = new URLSearchParams(window.location.search);
  const paymentId = params.get('payment_id') || params.get('collection_id');
  if(!paymentId) return;

  // restauramos el progreso guardado antes de salir a pagar
  const saved = localStorage.getItem('booking_state');
  if(saved){ Object.assign(state, JSON.parse(saved)); }

  state.step = 5;
  state.paymentStatus = 'checking';
  render();

  try{
    const resp = await fetch(`/api/verify-payment?payment_id=${paymentId}`);
    const data = await resp.json();
    state.paymentStatus = data.approved ? 'approved' : 'rejected';
    state.paymentId = paymentId;

    if(data.approved){
      await saveBookingToSheet();
    }
  } catch(err){
    state.paymentStatus = 'rejected';
  }
  // limpiamos la URL para que no quede el payment_id visible
  window.history.replaceState({}, '', window.location.pathname);
  render();
}

async function saveBookingToSheet(){
  if(state.bookingSaved) return;

  // Safety check: if state.day is null after returning from payment,
  // try to recover it from localStorage
  if(state.day === null || state.day === undefined){
    try{
      const saved = localStorage.getItem('booking_state');
      if(saved){ Object.assign(state, JSON.parse(saved)); }
    } catch(e){ console.warn('Could not recover state', e); }
  }

  // If still null, we can't write the booking — log and bail
  if(state.day === null || state.day === undefined){
    console.error('state.day is null — cannot save booking');
    return;
  }

  try{
    const resp = await fetch('/api/book-appointment', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        fecha: dateKey(CONFIG.days[state.day].date),
        hora: state.time,
        servicio: state.service,
        nombre: state.name,
        telefono: state.phone,
        monto: CONFIG.depositAmount,
        paymentId: state.paymentId,
      }),
    });
    const data = await resp.json();
    if(data.ok){
      state.bookingSaved = true;
      // Save only lightweight fields (no photo) to avoid QuotaExceededError
      try{
        const { photo, ...lightState } = state;
        localStorage.setItem('booking_state', JSON.stringify(lightState));
      } catch(e){ console.warn('localStorage save failed (non-critical)', e); }
    } else {
      state.paymentStatus = 'slot_taken';
    }
  } catch(err){
    console.error('Error guardando la cita', err);
  }
}

function toggleStep6Btn(){
  const btn = document.getElementById('step6btn');
  if(btn) btn.disabled = !(state.name && state.phone);
}
function restart(){
  state.step=1; state.category=null; state.service=null; state.services=[];
  state.photo=null; state.day=null; state.time=null; state.name=""; state.phone="";
  state.paymentStatus="pending"; state.paymentId=null;
  state.bookingSaved=false; state.takenMap={};
  localStorage.removeItem('booking_state');
  render();
}

render();
checkPaymentFromUrl();
</script>
